{% extends "base.html" %}
{% block title %}Search — CineTrack{% endblock %}

{% block content %}
<div class="search-page">
  <div class="search-hero">
    <h1>Find Something to Watch</h1>
    <div class="search-bar-wrap">
      <span class="search-bar-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="search-input" class="search-bar"
             placeholder="Search movies, TV shows, people…" autocomplete="off" autofocus />
    </div>
  </div>

  <div class="search-body">
    <div id="search-status" class="search-status"></div>
    <div class="poster-grid" id="search-results"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
