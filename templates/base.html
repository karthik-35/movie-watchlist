<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CineTrack{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────── -->
<nav class="navbar" id="navbar">
  <div class="navbar-left">
    <a class="navbar-logo" href="/">CineTrack</a>
    <ul class="nav-links">
      <li><a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a></li>
      <li><a href="/movies" class="nav-link {% if request.endpoint == 'movies_page' %}active{% endif %}">Movies</a></li>
      <li><a href="/tv" class="nav-link {% if request.endpoint == 'tv_page' %}active{% endif %}">TV Shows</a></li>
      <li><a href="/popular" class="nav-link {% if request.endpoint == 'popular_page' %}active{% endif %}">Popular</a></li>
      <li><a href="/mylist" class="nav-link {% if request.endpoint == 'mylist_page' %}active{% endif %}">My List</a></li>
      <li><a href="/browse/language" class="nav-link {% if request.endpoint in ('language_browse', 'language_browse_default') %}active{% endif %}">Browse by Languages</a></li>
    </ul>
  </div>
  <div class="navbar-right">
    <!-- Expanding search -->
    <div class="nav-search" id="nav-search">
      <button class="nav-search-toggle" id="search-toggle" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <input type="text" id="nav-search-input" class="nav-search-input" placeholder="Titles, people, genres" />
    </div>
  </div>
</nav>

<!-- ── Toast container ────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Page content ───────────────────────────────────────────────── -->
{% block content %}{% endblock %}

<!-- ── Trailer modal ──────────────────────────────────────────────── -->
<div class="trailer-modal" id="trailer-modal">
  <div class="trailer-modal-backdrop" onclick="closeTrailer()"></div>
  <div class="trailer-modal-content">
    <button class="trailer-modal-close" onclick="closeTrailer()">✕</button>
    <div class="trailer-modal-iframe-wrap">
      <iframe id="trailer-modal-iframe" src="" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
        allowfullscreen></iframe>
    </div>
    <div class="trailer-modal-footer">
      <button class="btn btn-red trailer-fs-btn" onclick="requestTrailerFullscreen()">⛶ Full Screen</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
