<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Movie Watchlist{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <!-- Google Fonts: Inter for clean modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ── Navigation ─────────────────────────────────────────── -->
  <nav class="navbar">
    <a class="navbar-brand" href="/">🎬 Watchlist</a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">My List</a>
      <a href="/search" class="nav-link {% if request.endpoint == 'search_page' %}active{% endif %}">Search</a>
    </div>
  </nav>

  <!-- ── Flash/Toast container ──────────────────────────────── -->
  <div id="toast-container"></div>

  <!-- ── Page content ───────────────────────────────────────── -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
