{% extends "base.html" %}
{% block title %}Loading… — CineTrack{% endblock %}

{% block content %}
<div id="detail-root" data-tmdb-id="{{ tmdb_id }}" data-media-type="{{ media_type }}">

  <!-- Skeleton shown while data loads -->
  <div id="detail-skeleton" class="detail-skeleton-wrap">
    <div class="skeleton" style="width:100%;height:520px"></div>
    <div style="padding:2rem 4%;display:flex;flex-direction:column;gap:1rem">
      <div class="skeleton" style="width:400px;height:2rem;border-radius:4px"></div>
      <div class="skeleton" style="width:250px;height:1rem;border-radius:4px"></div>
      <div class="skeleton" style="width:600px;height:4rem;border-radius:4px"></div>
    </div>
  </div>

  <!-- Real content -->
  <div id="detail-content" style="display:none">

    <!-- Backdrop hero -->
    <div class="detail-hero" id="detail-hero">
      <div class="detail-hero-img" id="detail-hero-img"></div>
      <div class="detail-hero-grad"></div>
      <div class="detail-hero-body">
        <div class="detail-badges" id="detail-badges"></div>
        <h1 class="detail-title" id="detail-title"></h1>
        <div class="detail-meta-row" id="detail-meta-row"></div>
        <div class="detail-mood-tags" id="detail-mood-tags"></div>
        <p class="detail-overview" id="detail-overview"></p>
        <div class="detail-languages" id="detail-languages"></div>
        <div class="detail-hero-actions">
          <button class="btn btn-red" id="detail-trailer-btn" style="display:none" onclick="openDetailTrailer()">
            ▶ Play
          </button>
          <button class="btn btn-outline-white" id="detail-add-btn" onclick="detailAddToWatchlist()">
            + My List
          </button>
        </div>
      </div>
    </div>

    <!-- Providers -->
    <section class="detail-section" id="providers-section" style="display:none">
      <div class="detail-section-inner">
        <h2 class="section-heading">Where to Watch</h2>
        <div class="provider-pills" id="provider-pills"></div>
      </div>
    </section>

    <!-- Available In (spoken languages) -->
    <section class="detail-section" id="avail-section" style="display:none">
      <div class="detail-section-inner">
        <h2 class="section-heading">Available In</h2>
        <div class="lang-pills" id="avail-pills"></div>
      </div>
    </section>


    <!-- Cast -->
    <section class="detail-section" id="cast-section" style="display:none">
      <div class="detail-section-inner">
        <h2 class="section-heading">Cast</h2>
        <div class="cast-row" id="cast-row"></div>
      </div>
    </section>

    <!-- Similar -->
    <section class="detail-section" id="similar-section" style="display:none">
      <div class="detail-section-inner">
        <h2 class="section-heading">Similar Titles</h2>
        <div class="row-wrap">
          <button class="row-arrow row-arrow-left" onclick="scrollRow('similar-cards', -1)">&#8249;</button>
          <div class="row-cards" id="similar-cards"></div>
          <button class="row-arrow row-arrow-right" onclick="scrollRow('similar-cards', 1)">&#8250;</button>
        </div>
      </div>
    </section>

    <!-- Recommendations -->
    <section class="detail-section" id="recs-section" style="display:none">
      <div class="detail-section-inner">
        <h2 class="section-heading">More Like This</h2>
        <div class="row-wrap">
          <button class="row-arrow row-arrow-left" onclick="scrollRow('recs-cards', -1)">&#8249;</button>
          <div class="row-cards" id="recs-cards"></div>
          <button class="row-arrow row-arrow-right" onclick="scrollRow('recs-cards', 1)">&#8250;</button>
        </div>
      </div>
    </section>

  </div><!-- /detail-content -->

  <!-- Error state -->
  <div id="detail-error" style="display:none;padding:10vh 4%;text-align:center">
    <p style="font-size:1.25rem;color:#b3b3b3">Could not load this title.</p>
    <a href="javascript:history.back()" class="btn btn-outline-white" style="margin-top:1.5rem">← Go Back</a>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/detail.js') }}"></script>
{% endblock %}
