{% extends "base.html" %}
{% block title %}Home — Watchlist{% endblock %}

{% block content %}
<!-- Hero banner -->
<section class="hero" id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content" id="hero-content">
    <div class="skeleton" style="width:500px;max-width:90%;height:3.5rem;border-radius:6px"></div>
    <div class="skeleton" style="width:260px;height:1.2rem;border-radius:4px;margin-top:.75rem"></div>
    <div class="skeleton" style="width:420px;max-width:90%;height:3.5rem;border-radius:4px;margin-top:1rem"></div>
    <div class="hero-actions skeleton-actions" style="display:flex;gap:.75rem;margin-top:1.5rem">
      <div class="skeleton" style="width:140px;height:46px;border-radius:6px"></div>
      <div class="skeleton" style="width:140px;height:46px;border-radius:6px"></div>
    </div>
  </div>
  <div class="hero-side" id="hero-side"></div>
</section>

<!-- Trending row — always first, static -->
<div class="rows-container">
  <div class="row-section" id="row-trending">
    <h2 class="row-title">Trending Now</h2>
    <div class="row-wrap">
      <button class="row-arrow row-arrow-left" onclick="scrollRow('row-trending-cards', -1)">&#8249;</button>
      <div class="row-cards" id="row-trending-cards"></div>
      <button class="row-arrow row-arrow-right" onclick="scrollRow('row-trending-cards', 1)">&#8250;</button>
    </div>
  </div>

  <!-- Dynamic rows injected by home.js (shuffled each reload) -->
  <div id="dynamic-home-rows"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
