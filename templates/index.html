{% extends "base.html" %}
{% block title %}My Watchlist{% endblock %}

{% block content %}
<div class="page-header">
  <h1>My Watchlist</h1>
  <div class="filter-tabs">
    <button class="tab-btn active" data-filter="all">All</button>
    <button class="tab-btn" data-filter="unwatched">Unwatched</button>
    <button class="tab-btn" data-filter="watched">Watched</button>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Watchlist grid — populated by JS -->
<div class="card-grid" id="watchlist-grid">
  <div class="empty-state" id="empty-state" style="display:none;">
    <div class="empty-icon">📭</div>
    <p>Your watchlist is empty.</p>
    <a href="/search" class="btn btn-primary">Find something to watch</a>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/watchlist.js') }}"></script>
{% endblock %}
